# Blueprint dell'edizione pilota jobs-only (Sprint 1/2 — topic clodia-modular-distro).
# NIENTE segreti qui: credenziali provider e passphrase backup post-install (UI/vault).
name: pilot2
profile:
  edition: pilot-jobs
  features:
    jobs: true
    topics: single
    rag: single
    integrations: fixed
    channels: false
  branding:
    name: "Pilot Agency"
    accent: "#1a5fb4"
native_seeds: [clodia]          # UN solo seed nativo (spec v0.3 §4b.1)
skill_packs: []                 # nessun pack esterno: solo base-pack (§4b.2)
packs: []                       # verticali del cliente (import al finalize)
providers: [anthropic-api]      # ≥1 obbligatorio (§4b.5)
pwa: false                      # PWA opzionale (§4b.6)
topic_storage: local-fs         # obbligatorio con topics attivi (§4b.7)
rag:
  collection: pilot-kb
integrations:
  allowed: [demo-tool]
  allow_manual_mcp: false
ports:
  agent_server: 8942
  tools: 8949
  webui: 8943
jobs:
  - name: "Report giornaliero demo"
    cron: "0 8 * * *"
    agent: clodia
    prompt: "Scrivi un breve report di stato dell'istanza nel topic workspace."
