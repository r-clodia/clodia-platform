# Edizione "acme-min" (design review 6 lug 2026):
# Agents=[clodia] · Jobs=on · packs=[base, demo] · integrations=[caselle
# email, demo-tool] · provider=[aws-bedrock EU] · pwa=off · topics=off.
name: acme-min
profile:
  edition: acme-min
  features:
    jobs: true
    topics: "off"
    rag: "off"
    integrations: fixed
    channels: false
  branding:
    name: "ACME Min"
    accent: "#0a7d4f"
native_seeds: [clodia]
skill_packs: []
packs:
  - source: ./demo-pack          # path locale relativo al blueprint (gap-2)
    pack: demo-pack
providers: [aws-region-eu]       # AWS Bedrock EU
pwa: false
integrations:
  allowed: [demo-tool]           # MCP in whitelist
  connectors: [mailboxes]        # solo Caselle email fra i connettori nativi
  allow_manual_mcp: false
ports:
  agent_server: 8942
  tools: 8949
  webui: 8943
