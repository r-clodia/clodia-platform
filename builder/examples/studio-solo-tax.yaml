# Edizione "Studio AI — Solo tax" (offerta Tomato per commercialista singolo).
# NIENTE segreti qui: provider key post-install.
name: studio
profile:
  edition: studio-solo-tax
  features:
    jobs: false
    topics: single
    rag: "off"
    integrations: fixed
    channels: false
  branding:
    name: "Studio Commercialista"
    accent: "#0a7d4f"
native_seeds: [clodia]            # trusted-core (identità PKI per chat/topic)
skill_packs: []                   # solo base-pack
packs:
  - source: <path-locale-del-pack>/studio-commercialista
    pack: studio-commercialista   # → plugin (3 skill + normattiva) + seed commercialista
providers: [aws-region-eu, anthropic-api]
pwa: false
helpdesk:
  enabled: false
topic_storage: local-fs
integrations:
  allowed: [normattiva]
  connectors: []
  allow_manual_mcp: false
topics_single:
  name: studio
  tier: SEAL-2                    # documenti fiscali del cliente
ports:
  agent_server: 8942
  tools: 8949
  webui: 8943
datadir: ~/clodia-studio-data
